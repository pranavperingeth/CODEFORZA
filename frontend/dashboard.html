<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problems — Codeforza</title>
  <meta name="description" content="Browse and solve competitive programming problems.">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="brand-name">Codeforza</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html" data-page="dashboard" class="active">Problems</a></li>
    <li><a href="/leaderboard.html" data-page="leaderboard">Leaderboard</a></li>
    <li><a href="/admin.html" id="admin-nav-link" data-page="admin" style="display:none">Admin</a></li>
  </ul>
  <div class="navbar-spacer"></div>
  <div id="user-pill" class="user-pill"></div>
  <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
</nav>

<!-- ── Main content ───────────────────────────────────────────────────────── -->
<div class="container page-content">

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Problems</div>
      <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">My Submissions</div>
      <div class="stat-value" id="stat-subs">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Solved</div>
      <div class="stat-value success" id="stat-solved">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Logged in as</div>
      <div class="stat-value" id="stat-user" style="font-size:1.1rem;margin-top:0.2rem">—</div>
    </div>
  </div>

  <!-- Problem list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Problem Set</span>
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="form-control" id="search-input" type="search"
          placeholder="Search problems…" style="width:220px">
      </div>
    </div>
    <div class="table-wrap">
      <table id="problems-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Difficulty</th>
            <th>Time Limit</th>
            <th>Memory</th>
          </tr>
        </thead>
        <tbody id="problems-tbody">
          <tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">⏳</div><h3>Loading problems…</h3></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ── My Submissions ─────────────────────────────────────────────────────── -->
<div class="container" style="margin-top:1.5rem; padding-bottom:3rem">
  <div class="card">
    <div class="card-header">
      <span class="card-title">My Recent Submissions</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Problem</th><th>Language</th><th>Verdict</th><th>Time</th><th>Submitted</th></tr>
        </thead>
        <tbody id="subs-tbody">
          <tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">📭</div><h3>No submissions yet</h3></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/app.js"></script>
<script>
const user = requireAuth();
if (user) {
  initNavbar('dashboard');
  document.getElementById('stat-user').textContent = user.username;
  loadData();
}

async function loadData() {
  try {
    const [problems, submissions] = await Promise.all([
      apiFetch('/api/problems/'),
      apiFetch('/api/judge/submissions'),
    ]);

    // Stats
    document.getElementById('stat-total').textContent = problems?.length ?? 0;
    document.getElementById('stat-subs').textContent  = submissions?.length ?? 0;
    const solvedSet = new Set(
      (submissions || [])
        .filter(s => s.status === 'AC' && s.problem_id)
        .map(s => s.problem_id)
    );
    document.getElementById('stat-solved').textContent = solvedSet.size;

    // Problem table
    renderProblems(problems || []);

    // Submissions table
    renderSubmissions(submissions || [], problems || []);

  } catch (err) {
    showToast('Failed to load data: ' + err.message, 'error');
  }
}

let _allProblems = [];
function renderProblems(problems) {
  _allProblems = problems;
  const tbody = document.getElementById('problems-tbody');
  if (!problems.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <h3>No problems yet</h3>
      <p>Ask an admin to add problems.</p>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML = problems.map((p, i) => `
    <tr style="cursor:pointer" onclick="window.location='/problem.html?id=${p.id}'">
      <td style="color:var(--text-muted);font-family:var(--font-code)">${i + 1}</td>
      <td><a href="/problem.html?id=${p.id}" style="color:var(--text-primary);font-weight:600" onclick="event.stopPropagation()">${escHtml(p.title)}</a></td>
      <td>${diffBadge(p.difficulty)}</td>
      <td style="font-family:var(--font-code);font-size:0.82rem">${p.time_limit}s</td>
      <td style="font-family:var(--font-code);font-size:0.82rem">${p.memory_limit} MB</td>
    </tr>
  `).join('');
}

function renderSubmissions(subs, problems) {
  const pMap = Object.fromEntries((problems || []).map(p => [p.id, p]));
  const tbody = document.getElementById('subs-tbody');
  if (!subs.length) return;
  tbody.innerHTML = subs.slice(0, 15).map(s => `
    <tr>
      <td>${s.problem_id ? `<a href="/problem.html?id=${s.problem_id}">${escHtml(pMap[s.problem_id]?.title || '…')}</a>` : '<span style="color:var(--text-muted)">Playground</span>'}</td>
      <td><span style="font-family:var(--font-code);font-size:0.82rem">${s.language}</span></td>
      <td>${verdictBadge(s.status)}</td>
      <td style="font-family:var(--font-code);font-size:0.82rem">${fmtTime(s.execution_time)}</td>
      <td style="color:var(--text-muted);font-size:0.82rem">${fmtDate(s.created_at)}</td>
    </tr>
  `).join('');
}

// Search
document.getElementById('search-input').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  const filtered = _allProblems.filter(p => p.title.toLowerCase().includes(q));
  renderProblems(filtered);
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
