<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem — Codeforza</title>
  <meta name="description" content="Read the problem statement and submit your solution.">
  <link rel="stylesheet" href="/static/styles.css">
  <!-- Monaco Editor loader (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="brand-name">Codeforza</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html" data-page="dashboard">Problems</a></li>
    <li><a href="/leaderboard.html" data-page="leaderboard">Leaderboard</a></li>
    <li><a href="/admin.html" id="admin-nav-link" data-page="admin" style="display:none">Admin</a></li>
  </ul>
  <div class="navbar-spacer"></div>
  <div id="user-pill" class="user-pill"></div>
  <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
</nav>

<!-- ── Judge layout ───────────────────────────────────────────────────────── -->
<div class="judge-page">
  <div class="judge-layout">

    <!-- ── LEFT: Problem statement ──────────────────────────────────────── -->
    <div class="problem-panel" id="problem-panel">
      <div style="color:var(--text-muted);padding:2rem;text-align:center">Loading problem…</div>
    </div>

    <!-- ── RIGHT: Editor + IO ───────────────────────────────────────────── -->
    <div class="editor-panel">

      <!-- Toolbar -->
      <div class="editor-toolbar">
        <select class="form-control" id="lang-select">
          <option value="cpp">C++ 17</option>
          <option value="c">C</option>
          <option value="python">Python 3</option>
          <option value="java">Java</option>
        </select>
        <div class="spacer"></div>
        <button class="btn btn-ghost btn-sm" id="run-btn" title="Run with custom input (Ctrl+Enter)">
          ▶ Run
        </button>
        <button class="btn btn-success btn-sm" id="submit-btn" title="Submit to judge">
          ⬆ Submit
        </button>
      </div>

      <!-- Monaco editor -->
      <div class="monaco-container" id="monaco-container"></div>

      <!-- IO section -->
      <div class="io-section">
        <div class="io-tabs">
          <button class="io-tab active" data-tab="stdin-pane">Input</button>
          <button class="io-tab" data-tab="stdout-pane">Output</button>
          <button class="io-tab" data-tab="stderr-pane">Errors</button>
          <button class="io-tab" data-tab="history-pane">History</button>
        </div>
        <div class="io-pane active" id="stdin-pane">
          <textarea class="io-pre" id="stdin-input" placeholder="Custom input (stdin)…" spellcheck="false"></textarea>
        </div>
        <div class="io-pane" id="stdout-pane">
          <pre class="io-pre" id="stdout-out">Run your code to see output.</pre>
        </div>
        <div class="io-pane" id="stderr-pane">
          <pre class="io-pre error-text" id="stderr-out"></pre>
        </div>
        <div class="io-pane" id="history-pane">
          <div id="history-list" style="font-size:0.82rem"></div>
        </div>
      </div>

      <!-- Verdict bar -->
      <div class="verdict-bar">
        <span class="verdict-label">Verdict</span>
        <span class="verdict-value" id="verdict-val">—</span>
        <span class="verdict-time" id="verdict-time"></span>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/app.js"></script>
<script>
// ── Auth ──────────────────────────────────────────────────────────────────
const currentUser = requireAuth();
if (currentUser) initNavbar();

// ── Problem ID from URL ───────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const problemId = params.get('id');
if (!problemId) window.location.href = '/dashboard.html';

let problem = null;

// ── Monaco Editor setup ───────────────────────────────────────────────────
const DEFAULT_CODE = {
  cpp: `#include <bits/stdc++.h>
using namespace std;

int main() {
    ios_base::sync_with_stdio(false);
    cin.tie(NULL);
    
    // Write your solution here
    
    return 0;
}`,
  c: `#include <stdio.h>
#include <stdlib.h>

int main() {
    // Write your solution here
    
    return 0;
}`,
  python: `import sys
input = sys.stdin.readline

def main():
    # Write your solution here
    pass

main()`,
  java: `import java.util.*;
import java.io.*;

public class Main {
    public static void main(String[] args) throws IOException {
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        // Write your solution here
    }
}`,
};

const LANG_MAP = { cpp: 'cpp', c: 'c', python: 'python', java: 'java' };

let editor = null;
let currentLang = 'cpp';

require.config({
  paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }
});

require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('monaco-container'), {
    value: DEFAULT_CODE.cpp,
    language: 'cpp',
    theme: 'vs-dark',
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
    fontLigatures: true,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    lineNumbers: 'on',
    renderLineHighlight: 'line',
    wordWrap: 'off',
    tabSize: 4,
    insertSpaces: true,
    bracketPairColorization: { enabled: true },
    padding: { top: 12, bottom: 12 },
    scrollbar: { verticalScrollbarSize: 6, horizontalScrollbarSize: 6 },
  });

  // Ctrl+Enter = Run
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => runCode());
});

// Language selector
document.getElementById('lang-select').addEventListener('change', function () {
  currentLang = this.value;
  if (editor) {
    monaco.editor.setModelLanguage(editor.getModel(), LANG_MAP[currentLang]);
    if (editor.getValue().trim() === '' || Object.values(DEFAULT_CODE).includes(editor.getValue())) {
      editor.setValue(DEFAULT_CODE[currentLang]);
    }
  }
});

// ── IO tabs ───────────────────────────────────────────────────────────────
document.querySelectorAll('.io-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.io-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.io-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// ── Load problem ──────────────────────────────────────────────────────────
async function loadProblem() {
  try {
    problem = await apiFetch(`/api/problems/${problemId}`);
    renderProblem(problem);
    document.title = `${problem.title} — Codeforza`;
  } catch (err) {
    document.getElementById('problem-panel').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">❌</div><h3>Problem not found</h3><p>${err.message}</p></div>`;
  }
}

function renderProblem(p) {
  const samples = (p.sample_test_cases || []).filter(tc => tc.is_sample);
  const samplesHtml = samples.length ? samples.map((tc, i) => `
    <div style="margin-bottom:1rem">
      <div class="sample-label">Sample Input ${i+1}</div>
      <pre class="sample-block">${escHtml(tc.input_data)}</pre>
      <div class="sample-label" style="margin-top:0.5rem">Sample Output ${i+1}</div>
      <pre class="sample-block">${escHtml(tc.expected_output)}</pre>
    </div>
  `).join('') : '<p style="color:var(--text-muted)">No sample test cases provided.</p>';

  // Pre-fill stdin with first sample input
  if (samples[0]) {
    document.getElementById('stdin-input').value = samples[0].input_data;
  }

  document.getElementById('problem-panel').innerHTML = `
    <div class="problem-statement">
      <h2>${escHtml(p.title)}</h2>
      <div class="problem-meta">
        <span class="problem-meta-item">🏆 ${diffBadge(p.difficulty)}</span>
        <span class="problem-meta-item">⏱ ${p.time_limit}s</span>
        <span class="problem-meta-item">💾 ${p.memory_limit} MB</span>
      </div>

      <div class="section-title">Problem Statement</div>
      <p>${escHtml(p.statement).replace(/\n/g, '<br>')}</p>

      ${p.input_format ? `<div class="section-title">Input Format</div><p>${escHtml(p.input_format).replace(/\n/g,'<br>')}</p>` : ''}
      ${p.output_format ? `<div class="section-title">Output Format</div><p>${escHtml(p.output_format).replace(/\n/g,'<br>')}</p>` : ''}
      ${p.constraints ? `<div class="section-title">Constraints</div><p><code>${escHtml(p.constraints).replace(/\n/g,'<br>')}</code></p>` : ''}

      <div class="section-title">Sample Test Cases</div>
      ${samplesHtml}
    </div>
  `;
}

// ── Run code (playground) ─────────────────────────────────────────────────
async function runCode() {
  if (!editor) { showToast('Editor not ready', 'warning'); return; }
  const code = editor.getValue();
  if (!code.trim()) { showToast('Code is empty', 'warning'); return; }

  const runBtn = document.getElementById('run-btn');
  runBtn.disabled = true;
  runBtn.textContent = '⏳';
  setVerdict('Running…', null, '');

  // Switch to output tab
  switchIoTab('stdout-pane');
  document.getElementById('stdout-out').textContent = 'Running…';
  document.getElementById('stderr-out').textContent = '';

  try {
    const result = await apiFetch('/api/judge/run', {
      method: 'POST',
      body: JSON.stringify({
        language: currentLang,
        code,
        stdin: document.getElementById('stdin-input').value,
      }),
    });

    document.getElementById('stdout-out').textContent = result.stdout || '(no output)';
    document.getElementById('stderr-out').textContent = result.stderr || '';
    setVerdict(result.status, result.execution_time, '');

    if (result.stderr) switchIoTab('stderr-pane');

  } catch (err) {
    showToast('Run failed: ' + err.message, 'error');
    setVerdict('Error', null, '');
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = '▶ Run';
  }
}

// ── Submit to judge ───────────────────────────────────────────────────────
async function submitCode() {
  if (!editor) { showToast('Editor not ready', 'warning'); return; }
  if (!problem) { showToast('Problem not loaded', 'warning'); return; }
  const code = editor.getValue();
  if (!code.trim()) { showToast('Code is empty', 'warning'); return; }

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ Judging…';
  setVerdict('Running…', null, '');

  try {
    const result = await apiFetch('/api/judge/submit', {
      method: 'POST',
      body: JSON.stringify({ problem_id: problemId, language: currentLang, code }),
    });

    setVerdict(result.status, result.execution_time, '');

    if (result.status === 'AC') showToast('✅ Accepted!', 'success');
    else showToast(`❌ ${result.status}`, 'error');

    // Append to history
    addToHistory(result);

    if (result.stderr) {
      document.getElementById('stderr-out').textContent = result.stderr;
      switchIoTab('stderr-pane');
    } else {
      switchIoTab('history-pane');
    }

  } catch (err) {
    showToast('Submit failed: ' + err.message, 'error');
    setVerdict('Error', null, '');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '⬆ Submit';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function setVerdict(status, time, label) {
  const vv = document.getElementById('verdict-val');
  vv.innerHTML = verdictBadge(status);
  document.getElementById('verdict-time').textContent = time != null ? fmtTime(time) : '';
}

function switchIoTab(panelId) {
  document.querySelectorAll('.io-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.io-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.io-tab[data-tab="${panelId}"]`)?.classList.add('active');
  document.getElementById(panelId)?.classList.add('active');
}

let historyEntries = [];
function addToHistory(sub) {
  historyEntries.unshift(sub);
  const list = document.getElementById('history-list');
  list.innerHTML = historyEntries.map(s => `
    <div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0;border-bottom:1px solid var(--border)">
      ${verdictBadge(s.status)}
      <span style="font-family:var(--font-code);color:var(--text-muted)">${s.language}</span>
      <span style="color:var(--text-muted)">${fmtTime(s.execution_time)}</span>
      <span style="color:var(--text-muted);margin-left:auto;font-size:0.78rem">${fmtDate(s.created_at)}</span>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Wire up buttons ───────────────────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', runCode);
document.getElementById('submit-btn').addEventListener('click', submitCode);

// ── Init ──────────────────────────────────────────────────────────────────
loadProblem();
</script>
</body>
</html>
