<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Codeforza</title>
  <meta name="description" content="Global ranking of all users on Codeforza.">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* ── Leaderboard-specific styles ─────────────────────────────────── */
    .lb-hero {
      text-align: center; padding: 2.5rem 1rem 1.5rem;
    }
    .lb-hero h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #f59e0b, #ef4444, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .lb-hero p { color: var(--text-secondary); margin-top: 0.3rem; }

    /* Podium top-3 cards */
    .podium { display: flex; justify-content: center; gap: 1.25rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .podium-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 1.5rem 1.75rem;
      text-align: center; min-width: 180px; flex: 0 1 220px;
      transition: all var(--transition); position: relative; overflow: hidden;
    }
    .podium-card:hover { border-color: var(--border-light); transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .podium-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .podium-card.gold::before   { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .podium-card.silver::before { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
    .podium-card.bronze::before { background: linear-gradient(90deg, #f97316, #fb923c); }

    .podium-rank {
      font-size: 2.5rem; font-weight: 900; line-height: 1;
      margin-bottom: 0.5rem;
    }
    .podium-card.gold .podium-rank   { color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.4); }
    .podium-card.silver .podium-rank { color: #cbd5e1; text-shadow: 0 0 20px rgba(203,213,225,0.3); }
    .podium-card.bronze .podium-rank { color: #fb923c; text-shadow: 0 0 20px rgba(251,146,60,0.3); }

    .podium-avatar {
      width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 0.5rem;
      display: grid; place-items: center;
      font-size: 1.1rem; font-weight: 800; color: white;
    }
    .podium-card.gold .podium-avatar   { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 0 24px rgba(245,158,11,0.35); }
    .podium-card.silver .podium-avatar { background: linear-gradient(135deg, #94a3b8, #64748b); }
    .podium-card.bronze .podium-avatar { background: linear-gradient(135deg, #f97316, #ea580c); }

    .podium-user { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.35rem; }

    .podium-stats { display: flex; justify-content: center; gap: 1.25rem; }
    .podium-stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .podium-stat-value { font-size: 1.25rem; font-weight: 800; color: var(--text-primary); margin-top: 0.1rem; }
    .podium-card.gold .podium-stat-value.score   { color: #fbbf24; }
    .podium-card.silver .podium-stat-value.score { color: #cbd5e1; }
    .podium-card.bronze .podium-stat-value.score { color: #fb923c; }

    /* Current-user highlight in the table */
    tr.is-me td { background: var(--accent-dim) !important; }

    /* Rank column badges for #1 #2 #3 */
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 0.82rem; font-weight: 800;
    }
    .rank-badge.gold   { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .rank-badge.silver { background: rgba(203,213,225,0.12); color: #cbd5e1; }
    .rank-badge.bronze { background: rgba(251,146,60,0.12); color: #fb923c; }

    /* Score bar (visual weight) */
    .score-bar-wrap { display: flex; align-items: center; gap: 0.6rem; }
    .score-bar {
      height: 6px; border-radius: 3px; min-width: 4px;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="brand-name">Codeforza</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html" data-page="dashboard">Problems</a></li>
    <li><a href="/leaderboard.html" data-page="leaderboard" class="active">Leaderboard</a></li>
    <li><a href="/admin.html" id="admin-nav-link" data-page="admin" style="display:none">Admin</a></li>
  </ul>
  <div class="navbar-spacer"></div>
  <div id="user-pill" class="user-pill"></div>
  <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
</nav>

<!-- ── Content ────────────────────────────────────────────────────────────── -->
<div class="container page-content">

  <!-- Hero -->
  <div class="lb-hero">
    <h1>🏆 Leaderboard</h1>
    <p>Ranked by total score (sum of difficulty of each solved problem)</p>
  </div>

  <!-- Podium (top 3) -->
  <div class="podium" id="podium"></div>

  <!-- Stats bar -->
  <div class="stats-grid" style="margin-bottom:1.5rem">
    <div class="stat-card">
      <div class="stat-label">Total Players</div>
      <div class="stat-value accent" id="stat-players">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Your Rank</div>
      <div class="stat-value warning" id="stat-my-rank">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Your Score</div>
      <div class="stat-value success" id="stat-my-score">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Your Solves</div>
      <div class="stat-value" id="stat-my-solves">—</div>
    </div>
  </div>

  <!-- Full table -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Global Rankings</span>
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="form-control" id="search-input" type="search"
          placeholder="Search users…" style="width:220px">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:70px">Rank</th>
            <th>User</th>
            <th>Solved</th>
            <th>Score</th>
            <th>Last AC</th>
          </tr>
        </thead>
        <tbody id="lb-tbody">
          <tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">⏳</div><h3>Loading leaderboard…</h3></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="/static/app.js"></script>
<script>
const currentUser = requireAuth();
if (currentUser) {
  initNavbar('leaderboard');
  loadLeaderboard();
}

let _allEntries = [];
let _maxScore = 1;

async function loadLeaderboard() {
  try {
    const entries = await apiFetch('/api/rankings/');
    if (!entries) return;
    _allEntries = entries;
    _maxScore = entries.length ? Math.max(entries[0].total_score, 1) : 1;

    // Stats
    document.getElementById('stat-players').textContent = entries.length;
    const me = entries.find(e => e.user_id === currentUser.id);
    if (me) {
      document.getElementById('stat-my-rank').textContent = `#${me.rank}`;
      document.getElementById('stat-my-score').textContent = me.total_score.toLocaleString();
      document.getElementById('stat-my-solves').textContent = me.problems_solved;
    } else {
      document.getElementById('stat-my-rank').textContent = '—';
      document.getElementById('stat-my-score').textContent = '0';
      document.getElementById('stat-my-solves').textContent = '0';
    }

    // Podium
    renderPodium(entries.slice(0, 3));

    // Table
    renderTable(entries);

  } catch (err) {
    showToast('Failed to load leaderboard: ' + err.message, 'error');
  }
}

function renderPodium(top3) {
  const podium = document.getElementById('podium');
  const classes = ['gold', 'silver', 'bronze'];
  const medals = ['🥇', '🥈', '🥉'];

  if (!top3.length) {
    podium.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><h3>No solves yet — be the first!</h3></div>';
    return;
  }

  podium.innerHTML = top3.map((e, i) => `
    <div class="podium-card ${classes[i]}">
      <div class="podium-rank">${medals[i]}</div>
      <div class="podium-avatar">${e.username.slice(0,2).toUpperCase()}</div>
      <div class="podium-user">${escHtml(e.username)}</div>
      <div class="podium-stats">
        <div>
          <div class="podium-stat-label">Score</div>
          <div class="podium-stat-value score">${e.total_score.toLocaleString()}</div>
        </div>
        <div>
          <div class="podium-stat-label">Solved</div>
          <div class="podium-stat-value">${e.problems_solved}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderTable(entries) {
  const tbody = document.getElementById('lb-tbody');
  if (!entries.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-state-icon">📊</div>
      <h3>No rankings yet</h3>
      <p>Solve some problems to appear on the board!</p>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = entries.map(e => {
    const isMe = e.user_id === currentUser.id;
    const rankBadge = e.rank <= 3
      ? `<span class="rank-badge ${['gold','silver','bronze'][e.rank-1]}">${e.rank}</span>`
      : `<span style="color:var(--text-muted);font-family:var(--font-code)">${e.rank}</span>`;
    const barWidth = Math.max((e.total_score / _maxScore) * 100, 2);

    return `
      <tr class="${isMe ? 'is-me' : ''}">
        <td>${rankBadge}</td>
        <td>
          <span style="font-weight:600;color:var(--text-primary)">${escHtml(e.username)}</span>
          ${isMe ? '<span class="badge badge-user" style="margin-left:0.4rem;font-size:0.65rem">YOU</span>' : ''}
        </td>
        <td style="font-family:var(--font-code);font-weight:600">${e.problems_solved}</td>
        <td>
          <div class="score-bar-wrap">
            <span style="font-family:var(--font-code);font-weight:700;min-width:50px">${e.total_score.toLocaleString()}</span>
            <div class="score-bar" style="width:${barWidth}%"></div>
          </div>
        </td>
        <td style="color:var(--text-muted);font-size:0.82rem">${e.last_ac_at ? fmtDate(e.last_ac_at) : '—'}</td>
      </tr>
    `;
  }).join('');
}

// Search
document.getElementById('search-input').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  const filtered = _allEntries.filter(e => e.username.toLowerCase().includes(q));
  renderTable(filtered);
});

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
